<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ludo Game UX</title>
</head>
<body>

<div class="ludo-board">

    <!-- Player Homes -->
    <div class="home red">RED</div>
    <div class="home green">GREEN</div>
    <div class="home yellow">YELLOW</div>
    <div class="home blue">BLUE</div>

    <!-- Center -->
    <div class="center">LUDO</div>

</div>

<div class="controls">
    <button>🎲 Roll Dice</button>
</div>
<style>
    body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.ludo-board {
    width: 400px;
    height: 400px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    border: 5px solid #333;
    margin-top: 30px;
}

.home {
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: white;
}

.red { background: #e74c3c; }
.green { background: #2ecc71; }
.yellow { background: #f1c40f; color: black; }
.blue { background: #3498db; }

.center {
    position: absolute;
    width: 120px;
    height: 120px;
    background: white;
    border: 3px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.controls {
    margin-top: 20px;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    cursor: pointer;
}

</style>
</body>
</html>
